name: Build iOS

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1 -Dkotlin.incremental=false"

jobs:
  ios-build:
    # Switch back to x86_64 Mac runner since it has 14GB of RAM instead of 7GB
    runs-on: macos-13
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin Native Compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - run: chmod +x ./gradlew

      - name: Build iOS Framework
        run: >
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64 
          --no-daemon 
          -Dorg.gradle.jvmargs="-Xmx10g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError"
          -Pkotlin.compiler.execution.strategy=in-process
          -Pkotlin.native.disableCompilerDaemon=true 
          -Pkotlin.native.cacheKind=none 
          -Pkotlin.mpp.enableCInteropCommonization=false
          --stacktrace

      - name: Upload iOS Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComposeApp-iOS-Framework
          path: composeApp/build/bin/iosArm64/releaseFramework/ComposeApp.framework
          if-no-files-found: warn
